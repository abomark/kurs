# Streamlit-tema for kursplattformen.
# Kanonisk versjon — speiler DESIGN_GUIDE.md v2 §9.
# Streamlit plukker den opp automatisk når appen starter.

[theme]
base = "dark"
primaryColor = "#005AA4"               # Vann
backgroundColor = "#0A0F1F"            # Canvas: nær-svart
secondaryBackgroundColor = "#0F1729"   # Surface-1: kort, sidebar
textColor = "#F4F6FB"                  # Text-primary (ikke Sand)
linkColor = "#7EB5D2"                  # Frost
codeBackgroundColor = "#131C33"        # Surface-2
font = "Inter, Arial, sans-serif"
baseFontSize = 16
baseRadius = "10px"
borderColor = "rgba(126, 181, 210, 0.10)"

[[theme.fontFaces]]
family = "Inter"
url = "https://fonts.gstatic.com/s/inter/v13/UcCO3FwrK3iLTeHuS_fvQtMwCp50KnMa1ZL7.woff2"
weight = "400 700"
style = "normal"

[theme.sidebar]
backgroundColor = "#0F1729"
secondaryBackgroundColor = "#131C33"
textColor = "#A8B3C7"
borderColor = "rgba(126, 181, 210, 0.10)"

[server]
headless = true

[browser]
gatherUsageStats = false

# Streamlit-tema for kursplattformen.
# Designsystem v1 "Bankbrief" — lyst marine + fersken-uttrykk,
# avledet fra PowerPoint-malen. Se Designsystem.html.
# Streamlit plukker den opp automatisk når appen starter.

[theme]
base = "light"
primaryColor = "#0A2C72"               # Marine
backgroundColor = "#FFFFFF"            # Canvas: hvit
secondaryBackgroundColor = "#F7F8FB"   # Surface: side / dempet flate
textColor = "#16203A"                  # Blekk (brødtekst)
linkColor = "#1F6FC4"                  # Azur
codeBackgroundColor = "#EEF2F8"        # Lys kode-flate
font = "Arial, Helvetica, sans-serif"
baseFontSize = 16
baseRadius = "10px"
borderColor = "#E3E8F1"

[theme.sidebar]
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F7F8FB"
textColor = "#3B4256"
borderColor = "#E3E8F1"

[server]
headless = true

[browser]
gatherUsageStats = false
